# =============================================================================
# Maestro E2E via Maestro Cloud (hosted real devices).
#
# Replaces the GitHub Actions Android emulator, which never booted on the
# Apple-Silicon macOS runner ("Timeout waiting for emulator to boot"). We build
# the debug APK on a cheap Linux runner and upload it + the .maestro flows to
# Maestro Cloud, which runs them on real hosted devices. Needs the
# MAESTRO_API_TOKEN repo secret.
# =============================================================================

name: Maestro E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'DelipuCash/**'
      - '.maestro/**'
      - '.github/workflows/maestro.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Maestro Cloud (hosted devices)
    runs-on: ubuntu-latest # no emulator needed — flows run on Maestro Cloud devices
    timeout-minutes: 45
    steps:
      # Actions pinned to commit SHAs (version in the comment): this workflow
      # consumes the MAESTRO_API_TOKEN / EXPO_TOKEN secrets, so a retargeted mutable
      # tag must not be able to change the executed code.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.10'

      # Caches ~/.gradle across runs so the cold native build drops to a few minutes.
      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: DelipuCash
        run: bun install --frozen-lockfile

      # Build the debug APK (Expo's default reactNativeArchitectures includes every
      # ABI, so it runs on Maestro Cloud's real devices). ubuntu-latest ships the
      # Android SDK, so no emulator/macOS is required.
      - name: Build dev APK
        working-directory: DelipuCash
        run: |
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleDebug

      # Upload APK + flows to Maestro Cloud (real hosted devices). The action waits
      # for the run and fails the job if a flow fails. auth.yaml establishes the
      # session the other flows rely on.
      - name: Run Maestro Cloud
        uses: mobile-dev-inc/action-maestro-cloud@892c9dd6e50cff4f8c9046f6263047dc5bf419d5 # v1
        with:
          api-key: ${{ secrets.MAESTRO_API_TOKEN }}
          # Robin/Maestro Cloud project the upload targets (a public identifier, not a
          # secret — the api-key is the secret). Stored as a repo variable.
          project-id: ${{ vars.MAESTRO_PROJECT_ID }}
          app-file: DelipuCash/android/app/build/outputs/apk/debug/app-debug.apk
          workspace: .maestro
