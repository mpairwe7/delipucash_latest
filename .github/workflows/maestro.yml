# =============================================================================
# Maestro smoke tests on Android emulator.
#
# Runs on PRs touching client code. Slow (10–15 min) so we keep it in its
# own workflow rather than blocking every CI run.
# =============================================================================

name: Maestro smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'DelipuCash/**'
      - '.maestro/**'
      - '.github/workflows/maestro.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Android emulator
    runs-on: macos-latest # macOS gets HW-accelerated emulator
    # Raised from 30m: the cold Gradle build (~18m) plus emulator boot + Maestro
    # flows (~10m) sat right on the old limit, so the job was guillotined mid-run
    # every time (status "cancelled", no signal). 50m gives the emulator step room
    # to finish; with Gradle caching below, warm runs land well under it.
    timeout-minutes: 50
    steps:
      # v5 + setup-java v5 run on Node 24 (v4 are deprecated; forced to Node 24
      # on 2026-06-16). setup-gradle is the actively-maintained, Node-24 action.
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      # Caches the Gradle user home (~/.gradle) across runs, so the ~18m cold
      # native build drops to a few minutes once the cache is warm.
      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: DelipuCash
        run: bun install --frozen-lockfile

      # Build the development APK once and reuse for all flows.
      # If you have a pre-built APK in EAS, switch to `eas build:download` instead.
      # Step-level timeout fails the build fast if it hangs, instead of silently
      # consuming the whole job budget and starving the emulator step.
      - name: Build dev APK
        working-directory: DelipuCash
        timeout-minutes: 30
        run: |
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleDebug

      - name: Boot Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r DelipuCash/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/auth.yaml || echo "auth flow had issues"
            maestro test .maestro/instant-reward.yaml || echo "instant-reward flow had issues"
            maestro test .maestro/redeem.yaml || echo "redeem flow had issues"
        env:
          MAESTRO_API_TOKEN: ${{ secrets.MAESTRO_API_TOKEN }}
