# =============================================================================
# Maestro smoke tests on Android emulator.
#
# Runs on PRs touching client code. Slow (10–15 min) so we keep it in its
# own workflow rather than blocking every CI run.
# =============================================================================

name: Maestro smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'DelipuCash/**'
      - '.maestro/**'
      - '.github/workflows/maestro.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Android emulator
    runs-on: macos-latest # macOS gets HW-accelerated emulator
    # Raised from 30m: the cold Gradle build plus emulator boot + Maestro flows sat
    # right on the old limit, so the job was guillotined mid-run every time (status
    # "cancelled", no signal). The macOS native build is highly variable (~18m to
    # 30m+ cold), so 60m gives both the build and the emulator step real headroom;
    # with Gradle caching below, warm runs land well under it.
    timeout-minutes: 60
    steps:
      # v5 + setup-java v5 run on Node 24 (v4 are deprecated; forced to Node 24
      # on 2026-06-16). setup-gradle is the actively-maintained, Node-24 action.
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      # Caches the Gradle user home (~/.gradle) across runs, so the ~18m cold
      # native build drops to a few minutes once the cache is warm.
      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: DelipuCash
        run: bun install --frozen-lockfile

      # Build the development APK once and reuse for all flows.
      # If you have a pre-built APK in EAS, switch to `eas build:download` instead.
      # Step timeout catches a genuine hang but must clear a cold native build,
      # which on macOS runs ~18-30m+; 45m leaves the job's 60m budget room for the
      # emulator + Maestro flows afterward. (A 30m cap here was too tight and the
      # build kept timing out before the emulator step ran.)
      - name: Build dev APK
        working-directory: DelipuCash
        timeout-minutes: 45
        run: |
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleDebug

      - name: Boot Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          # macos-latest runners are Apple Silicon (arm64); an x86_64 system image
          # never boots there ("device emulator-5554 not found" → boot timeout), so
          # use the arm64-v8a image which runs HW-accelerated on Apple Silicon. The
          # debug APK includes arm64-v8a (Expo's default reactNativeArchitectures).
          arch: arm64-v8a
          profile: pixel_6
          emulator-boot-timeout: 600
          script: |
            adb install -r DelipuCash/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/auth.yaml || echo "auth flow had issues"
            # questions-smoke runs after auth so the feed → detail → answer path has a
            # logged-in session. Non-gating (|| echo) like the others.
            maestro test .maestro/questions-smoke.yaml || echo "questions-smoke flow had issues"
            maestro test .maestro/instant-reward.yaml || echo "instant-reward flow had issues"
            maestro test .maestro/redeem.yaml || echo "redeem flow had issues"
        env:
          MAESTRO_API_TOKEN: ${{ secrets.MAESTRO_API_TOKEN }}
