# =============================================================================
# EAS Update (OTA) — publishes JS-only updates without going through store review.
#
# Triggers:
#   - Push of a tag matching v*  → publishes to the `production` channel
#   - Manual workflow_dispatch    → choose channel + branch + message
#
# Required GitHub secrets:
#   EXPO_TOKEN  — generate at https://expo.dev/settings/access-tokens
#
# Optional:
#   SENTRY_AUTH_TOKEN  — uploads source maps so OTA crashes have readable stacks
# =============================================================================

name: EAS Update

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        type: choice
        default: 'preview'
        options: [preview, production]
      message:
        description: 'Update message (visible in EAS dashboard)'
        required: true
        default: 'manual update'

permissions:
  contents: read

jobs:
  publish:
    name: Publish JS update
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: DelipuCash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine channel + message
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
            echo "message=${{ inputs.message }}" >> "$GITHUB_OUTPUT"
          else
            echo "channel=production" >> "$GITHUB_OUTPUT"
            echo "message=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish update
        run: |
          eas update \
            --channel "${{ steps.vars.outputs.channel }}" \
            --message "${{ steps.vars.outputs.message }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
