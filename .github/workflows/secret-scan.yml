# =============================================================================
# Secret Scanning — TruffleHog OSS + GGShield (Defense-in-Depth)
# =============================================================================
#
# Two-tool layered scanning:
#   Job 1: TruffleHog (primary)  — verified-secret detection, custom regex
#   Job 2: Credential patterns   — lightweight grep heuristics
#   Job 3: GGShield (optional)   — 200+ detectors, ML false-positive filtering
#
# GGShield activates ONLY when:
#   - Repository variable  ENABLE_GGSHIELD = "true"
#   - Repository secret    GITGUARDIAN_API_KEY  is set
# Without these, the workflow runs TruffleHog-only mode seamlessly.
#
# Scanning cadence:
#   | Type            | Trigger                | Depth           |
#   |-----------------|------------------------|-----------------|
#   | Pre-commit hook | Every local commit     | Staged changes  |
#   | Incremental CI  | Push / PR              | Shallow (50)    |
#   | Full history    | workflow_dispatch      | Entire repo     |
#
# Docs:
#   TruffleHog: https://github.com/trufflesecurity/trufflehog
#   GGShield:   https://docs.gitguardian.com/ggshield-docs
# =============================================================================

name: "Secret Scan"

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scan mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full-history
      report_only:
        description: "Report only (do not fail on findings)"
        required: false
        default: false
        type: boolean

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write   # Required for SARIF upload to Code Scanning

env:
  TRUFFLEHOG_VERSION: "3.88.26"

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: TruffleHog OSS (primary — always runs)
  # ─────────────────────────────────────────────────────────────────────────
  trufflehog:
    name: "TruffleHog Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ (github.event_name == 'workflow_dispatch' && inputs.scan_mode == 'full-history') && 0 || 50 }}

      - name: Determine scan mode
        id: mode
        run: |
          MODE="incremental"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.scan_mode }}"
          fi
          echo "scan_mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "::notice::Scan mode: $MODE"

      # ── Install pinned binary ──────────────────────────────────────────
      - name: Install TruffleHog v${{ env.TRUFFLEHOG_VERSION }}
        run: |
          TARBALL="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl -sSfL \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/${TARBALL}" \
            -o "$TARBALL"
          tar xzf "$TARBALL" trufflehog
          chmod +x trufflehog
          echo "Installed: $(./trufflehog --version)"

      # ── Incremental scan (push / PR) ──────────────────────────────────
      - name: "Scan: incremental"
        if: steps.mode.outputs.scan_mode == 'incremental'
        run: |
          echo "::group::TruffleHog incremental scan"
          ARGS=(
            git file://.
            --only-verified
            --fail
            --json
            --no-update
            --config=.trufflehog-config.yml
            --exclude-paths=.trufflehog-exclude-paths.txt
          )
          # For PRs, scan only the diff range
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ARGS+=(--since-commit="${{ github.event.pull_request.base.sha }}")
          fi
          set +e
          ./trufflehog "${ARGS[@]}" > trufflehog-results.json 2>&1
          EXIT_CODE=$?
          set -e
          echo "::endgroup::"

          FINDINGS=$(grep -c '"SourceMetadata"' trufflehog-results.json 2>/dev/null || echo 0)
          echo "::notice::Findings: $FINDINGS | Exit: $EXIT_CODE"

          if [[ $EXIT_CODE -eq 183 ]]; then
            echo "::error::Verified secrets detected! Review the artifact."
            exit 183
          elif [[ $EXIT_CODE -ne 0 && "$FINDINGS" -gt 0 ]]; then
            echo "::error::TruffleHog exited $EXIT_CODE with $FINDINGS finding(s)."
            exit $EXIT_CODE
          fi
          echo "::notice::No verified secrets detected."

      # ── Full-history scan (manual only) ────────────────────────────────
      - name: "Scan: full history"
        if: steps.mode.outputs.scan_mode == 'full-history'
        run: |
          echo "::group::TruffleHog full-history scan"
          set +e
          ./trufflehog git file://. \
            --only-verified \
            --fail \
            --json \
            --no-update \
            --config=.trufflehog-config.yml \
            --exclude-paths=.trufflehog-exclude-paths.txt \
            > trufflehog-results.json 2>&1
          EXIT_CODE=$?
          set -e
          echo "::endgroup::"

          FINDINGS=$(grep -c '"SourceMetadata"' trufflehog-results.json 2>/dev/null || echo 0)
          echo "::notice::Findings: $FINDINGS | Exit: $EXIT_CODE"

          if [[ $EXIT_CODE -eq 183 ]]; then
            if [[ "${{ inputs.report_only }}" == "true" ]]; then
              echo "::warning::Verified secrets found but report-only mode is active."
            else
              echo "::error::Verified secrets detected in history!"
              exit 183
            fi
          fi
          echo "::notice::Full-history scan complete."

      # ── Upload results ─────────────────────────────────────────────────
      - name: Upload SARIF (if produced)
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: trufflehog

      - name: Upload TruffleHog report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trufflehog-report-${{ github.run_id }}
          path: trufflehog-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Credential pattern check (lightweight grep heuristics)
  # ─────────────────────────────────────────────────────────────────────────
  credential-patterns:
    name: "Credential Pattern Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for hardcoded credential patterns
        run: |
          echo "::group::Credential pattern scan"
          PATTERNS=(
            'password\s*=\s*["\x27][^"\x27]{4,}["\x27]'
            'api[_-]?key\s*=\s*["\x27][^"\x27]{8,}["\x27]'
            'secret[_-]?key\s*=\s*["\x27][^"\x27]{8,}["\x27]'
            'access[_-]?token\s*=\s*["\x27][^"\x27]{8,}["\x27]'
            'private[_-]?key\s*=\s*["\x27][^"\x27]{8,}["\x27]'
          )

          ISSUES=0
          for pat in "${PATTERNS[@]}"; do
            HITS=$(grep -rnE "$pat" \
              --include="*.js" --include="*.mjs" --include="*.ts" \
              --include="*.tsx" --include="*.json" --include="*.yaml" --include="*.yml" . \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
              --exclude-dir=build --exclude-dir=.expo \
              --exclude="*.example" --exclude="*.sample" \
              --exclude="*.test.*" --exclude="*.spec.*" \
              2>/dev/null || true)
            if [[ -n "$HITS" ]]; then
              echo "::warning::Pattern match: $pat"
              echo "$HITS"
              ISSUES=1
            fi
          done
          echo "::endgroup::"

          if [[ $ISSUES -eq 1 ]]; then
            echo "::warning::Potential hardcoded credentials found. Review the output above."
            echo "If these are false positives, add exclusions to .trufflehog-config.yml."
            # Non-blocking — informational only
          else
            echo "::notice::No obvious credential patterns found."
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: GGShield (optional — complementary)
  # ─────────────────────────────────────────────────────────────────────────
  # Activates ONLY when BOTH conditions are met:
  #   1. Repository variable  ENABLE_GGSHIELD = "true"
  #   2. Repository secret    GITGUARDIAN_API_KEY  is configured
  #
  # To enable:
  #   Settings → Variables → Actions → New variable → ENABLE_GGSHIELD = true
  #   Settings → Secrets  → Actions → New secret   → GITGUARDIAN_API_KEY = ggu_...
  #
  # To disable: delete the ENABLE_GGSHIELD variable.
  # ─────────────────────────────────────────────────────────────────────────
  ggshield:
    name: "GGShield Secret Scan (optional)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.ENABLE_GGSHIELD == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ (github.event_name == 'workflow_dispatch' && inputs.scan_mode == 'full-history') && 0 || 50 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GGShield
        run: |
          pip install --quiet ggshield
          echo "Installed: $(ggshield --version)"

      - name: GGShield scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          if [[ -z "$GITGUARDIAN_API_KEY" ]]; then
            echo "::warning::GITGUARDIAN_API_KEY not set — skipping GGShield."
            exit 0
          fi

          echo "::group::GGShield secret scan"
          set +e
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ggshield secret scan ci --json --output ggshield-results.json 2>&1
          else
            ggshield secret scan ci --json --output ggshield-results.json 2>&1
          fi
          EXIT_CODE=$?
          set -e
          echo "::endgroup::"

          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::warning::GGShield detected potential secrets (exit $EXIT_CODE)."
            echo "TruffleHog is the primary gate — GGShield findings are advisory."
            # Non-blocking by default; change to 'exit 1' to make GGShield a hard gate
          else
            echo "::notice::GGShield: no secrets detected."
          fi

      - name: Upload GGShield report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ggshield-report-${{ github.run_id }}
          path: ggshield-results.json
          retention-days: 30
          if-no-files-found: ignore
