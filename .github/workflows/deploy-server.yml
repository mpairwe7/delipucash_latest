# =============================================================================
# Server schema guard + migrations.
#
# Deployment itself is handled by Vercel's Git integration (every push to main
# auto-deploys server/ to production; PRs get preview deploys). This workflow
# does the ONE thing the Git integration doesn't: validate the Prisma schema
# and apply pending migrations to the production database on every server
# change. A red run here means the schema/migrations are broken or the DB is
# unreachable — code may already be serving (Git integration deploys in
# parallel), so keep migrations ADDITIVE (new tables/columns/indexes) so a
# minute of old-schema/new-code overlap stays benign.
#
# History: this workflow used to also `vercel build` + `vercel deploy --prebuilt`,
# which (a) raced the Git integration's own production deploy of the same
# commit and (b) broke under the Bun-installed Vercel CLI (`spawn sh ENOENT`).
# One deploy path is enough — the explicit promote was dropped.
#
# Required GitHub secrets:
#   VERCEL_TOKEN      — https://vercel.com/account/tokens (env pull only)
#   VERCEL_ORG_ID     — `vercel link` then read .vercel/project.json
#   VERCEL_PROJECT_ID — same
# =============================================================================

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: Validate schema & apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      # Dummy DB env for install/validate ONLY (same fix as ci.yml's server-test job):
      # `postinstall` runs `prisma generate`, which loads prisma.config.ts and resolves
      # env('DIRECT_DATABASE_URL') at INSTALL time — Prisma's env() throws on a missing
      # var. Neither generate nor validate connects to a database, so placeholders are
      # safe. The migrate step below exports the REAL URLs from the pulled Vercel env,
      # shadowing these.
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_placeholder'
          DIRECT_DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_placeholder'

      - name: Validate Prisma schema
        run: bunx prisma validate
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_placeholder'
          DIRECT_DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_placeholder'

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Apply pending Prisma migrations to the production DB. The DB URL comes from the
      # Vercel production env pulled above — DIRECT_DATABASE_URL is the direct/session
      # connection the migration engine needs (the pooled transaction URL cannot run
      # migrations). We extract just those two keys instead of sourcing the file (so its
      # contents are never executed) and never echo the value. Fails the run if the DB is
      # unreachable or a migration fails.
      - name: Apply database migrations
        run: |
          ENV_FILE=.vercel/.env.production.local
          if [ ! -f "$ENV_FILE" ]; then echo "::error::Vercel env file not found — cannot read the DB URL"; exit 1; fi
          export DIRECT_DATABASE_URL="$(grep -E '^DIRECT_DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          export DATABASE_URL="$(grep -E '^DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          if [ -z "$DIRECT_DATABASE_URL" ] && [ -z "$DATABASE_URL" ]; then echo "::error::No DATABASE_URL/DIRECT_DATABASE_URL in the Vercel production env"; exit 1; fi
          bunx prisma migrate deploy

      - name: Migration status (post-apply)
        run: |
          ENV_FILE=.vercel/.env.production.local
          export DIRECT_DATABASE_URL="$(grep -E '^DIRECT_DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          export DATABASE_URL="$(grep -E '^DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          bunx prisma migrate status
