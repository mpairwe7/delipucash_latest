# =============================================================================
# Deploy server to Vercel.
#
# Production deploy fires on every push to main. Preview deploys fire on PRs
# automatically via Vercel's GitHub integration; this workflow only handles
# the main → production promotion explicitly so we can validate env vars and
# Prisma schema first.
#
# Required GitHub secrets:
#   VERCEL_TOKEN     — https://vercel.com/account/tokens
#   VERCEL_ORG_ID    — `vercel link` then read .vercel/project.json
#   VERCEL_PROJECT_ID — same
# =============================================================================

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Apply pending Prisma migrations to the production DB BEFORE promoting the new build,
      # so the schema is ready when the new code serves traffic. The DB URL comes from the
      # Vercel production env pulled above — DIRECT_DATABASE_URL is the direct/session
      # connection the migration engine needs (the pooled transaction URL on :6543 cannot
      # run migrations). We extract just those two keys instead of sourcing the file (so its
      # contents are never executed) and never echo the value. Fails the deploy if the DB is
      # unreachable or a migration fails — by design: don't ship code against an unmigrated schema.
      - name: Apply database migrations
        run: |
          ENV_FILE=.vercel/.env.production.local
          if [ ! -f "$ENV_FILE" ]; then echo "::error::Vercel env file not found — cannot read the DB URL"; exit 1; fi
          export DIRECT_DATABASE_URL="$(grep -E '^DIRECT_DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          export DATABASE_URL="$(grep -E '^DATABASE_URL=' "$ENV_FILE" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          if [ -z "$DIRECT_DATABASE_URL" ] && [ -z "$DATABASE_URL" ]; then echo "::error::No DATABASE_URL/DIRECT_DATABASE_URL in the Vercel production env"; exit 1; fi
          bunx prisma migrate deploy

      - name: Build prebuilt artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
